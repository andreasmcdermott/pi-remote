<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>pi remote</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
</head>
<body>

  <!-- Header / status bar -->
  <header id="header">
    <div id="header-left">
      <span id="status-dot" class="dot idle"></span>
      <span id="status-text">connecting…</span>
    </div>
    <div id="header-center">
      <div id="model-dropdown">
        <button id="model-btn" title="Switch model" disabled>pi remote</button>
        <div id="model-panel" class="hidden">
          <div id="model-list"></div>
        </div>
      </div>
    </div>
    <div id="header-right">
      <span id="session-stats"></span>
      <button id="abort-btn" title="Abort" disabled>■ Stop</button>
    </div>
  </header>

  <!-- Conversation -->
  <main id="conversation"></main>

  <!-- Slash command picker (shown above input) -->
  <div id="cmd-picker" class="hidden">
    <div id="cmd-list"></div>
  </div>

  <!-- Extension UI dialog overlay -->
  <div id="dialog-overlay" class="hidden">
    <div id="dialog-box">
      <h3 id="dialog-title"></h3>
      <p id="dialog-message" class="hidden"></p>
      <!-- select options rendered here -->
      <div id="dialog-options" class="hidden"></div>
      <!-- input -->
      <input id="dialog-input" type="text" class="hidden" autocorrect="off" autocapitalize="off" />
      <!-- editor -->
      <textarea id="dialog-editor" class="hidden" rows="6"></textarea>
      <div id="dialog-buttons">
        <button id="dialog-cancel" class="btn-secondary">Cancel</button>
        <button id="dialog-confirm" class="btn-primary hidden">OK</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <footer id="input-area">
    <div id="input-row">
      <textarea
        id="msg-input"
        placeholder="Send a message…"
        rows="1"
        autocorrect="off"
        autocapitalize="sentences"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" class="btn-primary" disabled>Send</button>
    </div>
    <div id="mode-row">
      <label class="mode-opt">
        <input type="radio" name="send-mode" value="prompt" checked /> Prompt
      </label>
      <label class="mode-opt">
        <input type="radio" name="send-mode" value="steer" /> Steer
      </label>
      <label class="mode-opt">
        <input type="radio" name="send-mode" value="follow_up" /> Follow-up
      </label>
    </div>
  </footer>

  <script src="client.js"></script>
</body>
</html>
